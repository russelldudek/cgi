name: Publish complete CGI candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-campaign.yml'

permissions:
  contents: write

concurrency:
  group: publish-cgi-campaign
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staged repository
        uses: actions/checkout@v4
      - name: Verify and install audited campaign source
        shell: bash
        run: |
          cat .bootstrap/part-*.txt > /tmp/cgi-campaign-source.b64
          base64 --decode /tmp/cgi-campaign-source.b64 > /tmp/cgi-campaign-source.zip
          test "$(sha256sum /tmp/cgi-campaign-source.zip | cut -d' ' -f1)" = "0c5e5de6943f1d28665c4f472f3b0cba75bbc2c38b673d3802f15297a6a86af0"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          unzip -q /tmp/cgi-campaign-source.zip -d .
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Use runner Chrome and install PDF libraries
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check playwright pypdf
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME"
          sudo ln -sf "$CHROME" /usr/bin/chromium
          /usr/bin/chromium --version
      - name: Build and validate PDFs
        run: python scripts/build-pdfs.py
      - name: Commit complete campaign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete CGI candidate campaign"
          git push
