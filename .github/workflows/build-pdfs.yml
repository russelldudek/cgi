name: Build printable campaign PDFs

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'styles.css'
      - 'styles/**'
      - 'brand-tokens.css'
      - 'app.js'
      - 'assets/brand/**'
      - 'scripts/build-pdfs.py'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: campaign-pdfs
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install renderer
        run: |
          python -m pip install --disable-pip-version-check playwright==1.57.0 pypdf==5.9.0
          python -m playwright install --with-deps chromium
      - name: Build and validate PDFs
        run: python scripts/build-pdfs.py
      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf
          git diff --cached --quiet && exit 0
          git commit -m "Build printable campaign PDFs"
          git push
