name: Capture job posting

on:
  push:
    paths:
      - '.github/workflows/fetch-posting.yml'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch posting
        shell: bash
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from urllib.request import Request, urlopen
          from pathlib import Path
          import html, re

          url = 'https://cgi.njoyn.com/corp/xweb/xweb.asp?NTKN=c&clid=21001&Page=JobDetails&Jobid=J0626-1398&BRID=1311552&lang=1'
          req = Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          raw = urlopen(req, timeout=60).read().decode('utf-8', errors='replace')
          Path('job-posting-source.html').write_text(raw, encoding='utf-8')

          class TextExtractor(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.skip = 0
                  self.parts = []
              def handle_starttag(self, tag, attrs):
                  if tag in {'script', 'style', 'noscript'}:
                      self.skip += 1
                  if not self.skip and tag in {'p','div','section','article','li','h1','h2','h3','h4','tr','br','dt','dd'}:
                      self.parts.append('\n')
              def handle_endtag(self, tag):
                  if tag in {'script', 'style', 'noscript'} and self.skip:
                      self.skip -= 1
                  if not self.skip and tag in {'p','div','section','article','li','h1','h2','h3','h4','tr','dt','dd'}:
                      self.parts.append('\n')
              def handle_data(self, data):
                  if not self.skip:
                      self.parts.append(data)

          parser = TextExtractor()
          parser.feed(raw)
          text = html.unescape(''.join(parser.parts))
          text = re.sub(r'[ \t]+', ' ', text)
          text = re.sub(r'\n\s*\n+', '\n\n', text)
          Path('job-posting.txt').write_text('Source: ' + url + '\n\n' + text.strip() + '\n', encoding='utf-8')
          PY
      - name: Commit captured source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add job-posting-source.html job-posting.txt
          git commit -m "Capture canonical job posting" || exit 0
          git push
