<svg aria-labelledby="load-title load-desc" class="load-diagram" role="img" viewbox="0 0 760 620">
<title id="load-title">Enterprise GenAIOps architecture load test</title>
<desc id="load-desc">A selected AI use case is tested through business outcome, pattern, data, identity, evaluation, observability, human authority and production ownership layers before receiving an architecture disposition.</desc>
<defs>
<pattern height="20" id="minor-grid" patternunits="userSpaceOnUse" width="20">
<path d="M20 0H0V20" fill="none" stroke="rgba(255,255,255,.055)" stroke-width="1"></path>
</pattern>
<pattern height="100" id="major-grid" patternunits="userSpaceOnUse" width="100">
<rect fill="url(#minor-grid)" height="100" width="100"></rect>
<path d="M100 0H0V100" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1"></path>
</pattern>
<pattern height="8" id="warning-hatch" patterntransform="rotate(45)" patternunits="userSpaceOnUse" width="8">
<line opacity=".45" stroke="#e31937" stroke-width="3" x1="0" x2="0" y1="0" y2="8"></line>
</pattern>
</defs>
<rect class="diagram-grid" fill="url(#major-grid)" height="620" width="760" x="0" y="0"></rect>
<g aria-hidden="true" class="diagram-dimensions">
<line x1="74" x2="74" y1="88" y2="548"></line>
<line x1="62" x2="86" y1="88" y2="88"></line>
<line x1="62" x2="86" y1="548" y2="548"></line>
<text transform="rotate(-90 46 325)" x="46" y="325">ENTERPRISE LOAD PATH</text>
